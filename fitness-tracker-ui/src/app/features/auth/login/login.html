<div class="auth-container">
  <div class="auth-card">
    <img src="/fitness-tracker.png" alt="Fitness Tracker Logo" class="auth-logo" />

    <h2 class="auth-title">Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <input type="email" formControlName="email" placeholder="Email" />
        <small class="error" *ngIf="email?.touched && email?.invalid">
          Email is required
        </small>
      </div>

      <div class="form-group password-group">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Password" />
        <span class="material-icons eye-btn" (click)="togglePassword()">
          {{ showPassword ? 'visibility_off' : 'visibility' }}
        </span>
        <small class="error" *ngIf="password?.touched && password?.invalid">
          Password is required
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Login
      </button>

    </form>

    <p class="switch-text">
      Don't have an account?
      <a routerLink="/register">Sign up</a>
    </p>
  </div>
</div>
